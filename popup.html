<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Audio Normalizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      width: 240px;
      padding: 16px;
      user-select: none;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 14px;
      letter-spacing: 0.3px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .label {
      font-size: 12px;
      color: #aaa;
    }

    /* 開關 */
    .toggle {
      position: relative;
      width: 38px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #ff4444; }
    input:checked + .slider::before { transform: translateX(18px); }

    /* 壓縮強度 */
    .preset-group {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .preset-btn {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a2a;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .preset-btn.active {
      background: #ff4444;
      border-color: #ff4444;
      color: #fff;
      font-weight: 600;
    }

    .section-title {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }

    .info {
      margin-top: 14px;
      font-size: 10px;
      color: #555;
      line-height: 1.5;
    }
    .info span { color: #777; }
  </style>
</head>
<body>
  <h1>🎧 Audio Normalizer</h1>

  <div class="row">
    <span class="label">啟用音訊處理</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-title">壓縮強度</div>
  <div class="preset-group">
    <button class="preset-btn" data-preset="light">輕度</button>
    <button class="preset-btn" data-preset="standard">標準</button>
    <button class="preset-btn" data-preset="strong">強力</button>
  </div>

  <div class="info">
    <span>✓</span> 高通 20 Hz：截掉次聲波<br>
    <span>✓</span> 低通 20 kHz：截掉超音波<br>
    <span>✓</span> 動態壓縮：自動拉平各影片音量
  </div>

  <script>
    const DEFAULT = { enabled: true, compressorPreset: 'standard' };

    const toggle = document.getElementById('enableToggle');
    const presetBtns = document.querySelectorAll('.preset-btn');

    // 讀取目前設定
    chrome.storage.local.get(DEFAULT, (settings) => {
      toggle.checked = settings.enabled;
      setActivePreset(settings.compressorPreset);
    });

    // 開關切換
    toggle.addEventListener('change', () => {
      const value = toggle.checked;
      chrome.storage.local.set({ enabled: value });
      sendToContent({ type: 'SET_ENABLED', value });
    });

    // 壓縮強度切換
    presetBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset;
        chrome.storage.local.set({ compressorPreset: preset });
        setActivePreset(preset);
        sendToContent({ type: 'SET_PRESET', value: preset });
      });
    });

    function setActivePreset(preset) {
      presetBtns.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.preset === preset);
      });
    }

    function sendToContent(msg) {
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) {
          chrome.tabs.sendMessage(tabs[0].id, msg);
        }
      });
    }
  </script>
</body>
</html>
